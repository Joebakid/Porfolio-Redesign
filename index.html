  <!-- ========================= -->
  <!-- VERCEL ANALYTICS -->
  <!-- ========================= -->
  <script>
    (function () {
      var host = window.location.hostname;
      var isLocal =
        host === "localhost" ||
        host === "127.0.0.1" ||
        host === "[::1]";

      if (isLocal) return;

      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };

      var s = document.createElement("script");
      s.defer = true;
      s.src = "/_vercel/insights/script.js";
      document.head.appendChild(s);
    })();
  </script>
