<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ========================= -->
  <!-- BASIC -->
  <!-- ========================= -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />

  <title>Joseph Bawo</title>

  <meta
    name="description"
    content="Joseph Bawo is a Full Stack Developer building crypto tools, staking platforms, NFT utilities, and blockchain products. Most projects showcased were designed and developed personally."
  />

  <!-- ========================= -->
  <!-- FAVICON -->
  <!-- ========================= -->
  <link rel="icon" href="/img/logo.png" />

  <!-- ========================= -->
  <!-- CANONICAL -->
  <!-- ========================= -->
  <link rel="canonical" href="https://josephbawo.tech/" />

  <!-- ========================= -->
  <!-- MANIFEST -->
  <!-- ========================= -->
  <link rel="manifest" href="/manifest.json" />

  <!-- ========================= -->
  <!-- OPEN GRAPH (WhatsApp / FB / Telegram / Discord) -->
  <!-- ========================= -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Joseph Bawo" />
  <meta property="og:title" content="Joseph Bawo" />
  <meta
    property="og:description"
    content="Full Stack Developer building crypto tools, NFT utilities, staking platforms, and blockchain products."
  />
  <meta property="og:url" content="https://josephbawo.tech/" />

  <!-- 🔥 IMPORTANT: USE LANDSCAPE IMAGE -->
  <!-- Create /public/og-image.png (1200x630) -->
  <meta property="og:image" content="https://josephbawo.tech/og-image.png?v=1" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- ========================= -->
  <!-- TWITTER -->
  <!-- ========================= -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Joseph Bawo" />
  <meta
    name="twitter:description"
    content="Full Stack Developer building crypto tools and blockchain products."
  />
  <meta name="twitter:image" content="https://josephbawo.tech/og-image.png?v=1" />

</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>

  <!-- Google Translate Mount -->
  <div id="google_translate_element" style="display:none;"></div>

  <div id="root"></div>

  <!-- ========================= -->
  <!-- VITE ENTRY -->
  <!-- ========================= -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- ========================= -->
  <!-- GOOGLE TRANSLATE -->
  <!-- ========================= -->
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: "en",
          autoDisplay: false,
        },
        "google_translate_element"
      );
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <!-- ========================= -->
  <!-- VERCEL ANALYTICS -->
  <!-- ========================= -->
  <script>
    (function () {
      var host = window.location.hostname;
      var isLocal =
        host === "localhost" ||
        host === "127.0.0.1" ||
        host === "[::1]";

      if (isLocal) return;

      window.va =
        window.va ||
        function () {
          (window.vaq = window.vaq || []).push(arguments);
        };

      var s = document.createElement("script");
      s.defer = true;
      s.src = "/_vercel/insights/script.js";
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
