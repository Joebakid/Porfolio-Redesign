name: Deploy to IPFS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Install upload dependencies
        run: npm install form-data node-fetch@2

      - name: Upload to Pinata
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const FormData = require('form-data');
          const fetch = require('node-fetch');

          async function upload() {
            const form = new FormData();
            function addFiles(dir, base) {
              for (const file of fs.readdirSync(dir)) {
                const full = path.join(dir, file);
                const rel = path.join(base, file);
                if (fs.statSync(full).isDirectory()) {
                  addFiles(full, rel);
                } else {
                  form.append('file', fs.createReadStream(full), { filepath: 'dist/' + rel });
                }
              }
            }
            addFiles('./dist', '');
            form.append('pinataMetadata', JSON.stringify({ name: 'joebakid-portfolio' }));
            const res = await fetch('https://api.pinata.cloud/pinning/pinFileToIPFS', {
              method: 'POST',
              headers: {
                pinata_api_key: process.env.PINATA_API_KEY,
                pinata_secret_api_key: process.env.PINATA_SECRET_KEY,
                ...form.getHeaders()
              },
              body: form
            });
            const data = await res.json();
            console.log('CID=' + data.IpfsHash);
          }
          upload();
          "
        env:
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_SECRET_KEY: ${{ secrets.PINATA_SECRET_KEY }}
