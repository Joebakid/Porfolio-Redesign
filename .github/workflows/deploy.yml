name: Deploy to IPFS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload to Pinata
        run: |
          CID=$(curl -s -X POST "https://api.pinata.cloud/pinning/pinFileToIPFS" \
            -H "pinata_api_key: ${{ secrets.PINATA_API_KEY }}" \
            -H "pinata_secret_api_key: ${{ secrets.PINATA_SECRET_KEY }}" \
            -F "file=@./dist" \
            --form 'pinataMetadata={"name":"portfolio"}' \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['IpfsHash'])")
          echo "CID=$CID" >> $GITHUB_ENV
          echo "✅ Uploaded! CID = $CID"

      - name: Print CID
        run: echo "Your site CID is $CID"
