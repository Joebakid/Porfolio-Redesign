name: Deploy to IPFS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Pin to Pinata
        id: pinata
        uses: aquiladev/ipfs-action@master
        with:
          path: ./dist
          service: pinata
          pinataKey: ${{ secrets.PINATA_API_KEY }}
          pinataSecret: ${{ secrets.PINATA_SECRET_KEY }}

      - name: Print CID
        run: echo "Your new CID is ${{ steps.pinata.outputs.hash }}"
